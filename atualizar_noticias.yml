name: Atualizar Monitor de Notícias

on:
  schedule:
    # Roda a cada 30 minutos (padrão Cron)
    - cron: '*/30 * * * *'
  workflow_dispatch: # Permite que você mude/rode manualmente pelo site se quiser

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Copiar os arquivos do repositório
      uses: actions/checkout@v3

    - name: Configurar o Python
      uses: actions/setup-python@v4
      with:
        python-with-version: '3.10'

    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Executar o raspador de notícias
      run: python main.py

    - name: Salvar mudanças no banco de dados e enviar ao GitHub
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add noticias.db
        git commit -m "Auto-update: Novas matérias coletadas" || echo "Nenhuma matéria nova encontrada."
        git push